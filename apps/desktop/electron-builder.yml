# Cross-platform unpacked builds are the blocking production-E2E artifact.
# Release archives remain unsigned for v0.1.

appId: com.engineering-ui-kit.workbench
productName: Engineering UI Kit
directories:
  output: ../../release
files:
  - dist/**
  - package.json
  - from: ../gui/dist
    to: gui/dist
# Ship the built-in sample projects seeded on first run.
extraResources:
  - from: ../../runtimes/python
    to: capabilities-runtime-python
    filter:
      - pyproject.toml
      - 'src/**/*'
  - from: ../../examples/work-orders-monolith
    to: examples/work-orders-monolith
    filter:
      - '**/*'
      - '!node_modules'
      - '!dist'
      - '!tsconfig.tsbuildinfo'
  - from: ../../examples/aircraft-performance-sample
    to: examples/aircraft-performance-sample
    filter:
      - '**/*'
      - '!node_modules'
      - '!dist'
extraMetadata:
  main: dist/main.js
win:
  target:
    - nsis
    - zip
  artifactName: engineering-ui-kit-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target:
    - zip
  artifactName: engineering-ui-kit-${version}-mac-${arch}.${ext}
linux:
  target:
    - AppImage
    - tar.gz
  artifactName: engineering-ui-kit-${version}-linux-${arch}.${ext}
