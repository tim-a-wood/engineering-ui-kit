# Cross-platform unpacked builds are the blocking production-E2E artifact.
# Release archives remain unsigned for v0.1.

appId: com.engineering-ui-kit.workbench
productName: Engineering UI Kit
directories:
  output: ../../release
files:
  - dist/**
  - package.json
  - from: ../gui/dist
    to: gui/dist
# Ship the built-in sample projects seeded on first run.
extraResources:
  # WebView preloads are loaded by a separate renderer process. Keep this one
  # outside app.asar so Windows Chromium can resolve the file URL reliably.
  - from: dist/preload/previewGuestPreload.cjs
    to: previewGuestPreload.cjs
  # electron-builder intentionally prunes declaration files from normal
  # production dependencies. Generation needs the complete runtime package,
  # including .d.ts files, so targets can pass the real TypeScript build gate.
  - from: ../../packages/capabilities-runtime-ts
    to: capabilities-runtime-typescript
    filter:
      - package.json
      - 'dist/**/*'
  - from: ../../runtimes/python
    to: capabilities-runtime-python
    filter:
      - pyproject.toml
      - README.md
      - 'src/**/*'
      - '!src/**/*.egg-info/**'
      - '!src/**/__pycache__/**'
      - '!src/**/*.pyc'
  - from: ../../examples/work-orders-monolith
    to: examples/work-orders-monolith
    filter:
      - '**/*'
      - '!node_modules'
      - '!dist'
      - '!tsconfig.tsbuildinfo'
  - from: ../../examples/aircraft-performance-sample
    to: examples/aircraft-performance-sample
    filter:
      - '**/*'
      - '!node_modules'
      - '!dist'
extraMetadata:
  main: dist/main.js
win:
  target:
    - nsis
    - zip
  artifactName: engineering-ui-kit-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  # v0.1 artifacts are intentionally unsigned. Explicitly disable identity
  # auto-discovery so a developer certificate cannot make otherwise identical
  # local/CI packaging nondeterministic (or fail on downloaded Electron xattrs).
  identity: null
  target:
    - zip
  artifactName: engineering-ui-kit-${version}-mac-${arch}.${ext}
linux:
  target:
    - AppImage
    - tar.gz
  artifactName: engineering-ui-kit-${version}-linux-${arch}.${ext}
