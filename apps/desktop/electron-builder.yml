# Windows-first packaging configuration (PRD §10). Build on a Windows machine:
#
#   npm run build --workspaces
#   npx electron-builder --config apps/desktop/electron-builder.yml --win
#
# Output: NSIS installer + portable folder under release/. Code signing is not
# configured for v0.1 (manual distribution).

appId: com.engineering-ui-kit.workbench
productName: Engineering UI Kit
directories:
  output: ../../release
files:
  - dist/**
  - package.json
  - from: ../gui/dist
    to: gui/dist
# Ship the built-in sample project (seeded on first run). Running its dev
# server / verification from a packaged install requires `npm install` inside
# the copied folder; the in-app sample description says so.
extraResources:
  - from: ../../examples/work-orders-monolith
    to: examples/work-orders-monolith
    filter:
      - '**/*'
      - '!node_modules'
      - '!dist'
      - '!tsconfig.tsbuildinfo'
extraMetadata:
  main: dist/main.js
win:
  target:
    - nsis
    - zip
  artifactName: engineering-ui-kit-${version}-win-${arch}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
mac:
  target: [] # macOS packaging intentionally out of scope for v0.1
